<!DOCTYPE html>
<html>
<head>
<title>Secure Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#dfe9f3,#ffffff);
}

.box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0px 6px 15px rgba(0,0,0,0.2);
text-align:center;
}

input{
padding:8px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 15px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
}
  .Box{
position:relative;
    width:100%;
}

.eyeBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>🔐 Enter Password</h2>

<input type="password" id="password" placeholder="Enter password">
<span class="eyeBtn" onclick="togglePassword()">👁️</span>

<br>

<button onclick="checkPassword()">Unlock</button>

<p id="error" class="error"></p>

</div>

<script>

const correctPassword = "feestracker"; // yahan apna password set karo

function checkPassword(){

let entered = document.getElementById("password").value;

if(entered === correctPassword){

window.location.href = "tracker.html";

}else{

document.getElementById("error").innerText = "Wrong Password ❌";

}

}
  function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</body>
</html>
